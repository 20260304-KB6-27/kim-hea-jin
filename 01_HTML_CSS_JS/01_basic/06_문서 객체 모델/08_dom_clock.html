<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    window.onload = function () {
      const clock = document.getElementById('clock');

      // setInterval(반복함수, ms)
      setInterval(function () {
        let now = new Date();
        clock.innerHTML = now.toString();
      }, 1000);
    };
  </script>
</head>

<body>
  <h1 id="clock"></h1>
</body>

</html>
