<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      window.onload = function () {
        let button = document.getElementById('btn');

        button.onclick = function () {
          // checkbox element name으로 가져옴
          let food = document.getElementsByName('food');
          // for loop 돌면서 체크된 element의 value 출력
          for (let i = 0; i < food.length; i++) {
            if (food[i].checked) {
              console.log(food[i].value);
            }
          }
        };
      };
    </script>
  </head>

  <body>
    <form>
      <div>
        좋아하는 음식은?
        <label
          ><input type="checkbox" name="food" value="라면" />
          라면
        </label>
        <label
          ><input type="checkbox" name="food" value="만두" />
          만두
        </label>
        <label
          ><input type="checkbox" name="food" value="불고기" />
          불고기
        </label>
        <input id="btn" type="button" value="전송" />
      </div>
    </form>
  </body>
</html>
